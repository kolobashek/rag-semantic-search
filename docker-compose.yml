services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    profiles:
      - storage
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    profiles:
      - storage
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-rag-catalog}
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb -p "local/$$MINIO_BUCKET" || true &&
        mc anonymous set none "local/$$MINIO_BUCKET" || true

  web:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - qdrant
    ports:
      - "${RAG_WEB_PORT:-8080}:8080"
    volumes:
      - "${RAG_CONFIG_PATH:-./config.docker.json}:/app/config.json:ro"
      - app_state:/data/state
      - app_logs:/data/logs
      - model_cache:/data/cache
      - "${RAG_CATALOG_PATH:-O:/Обмен}:/data/catalog:ro"
    command: ["rag-web", "--host", "0.0.0.0", "--port", "8080", "--no-show"]

  bot:
    build:
      context: .
    restart: unless-stopped
    profiles:
      - bot
    depends_on:
      - qdrant
    volumes:
      - "${RAG_CONFIG_PATH:-./config.docker.json}:/app/config.json:ro"
      - app_state:/data/state
      - app_logs:/data/logs
      - model_cache:/data/cache
      - "${RAG_CATALOG_PATH:-O:/Обмен}:/data/catalog:ro"
    command: ["rag-telegram-bot"]

  indexer:
    build:
      context: .
    profiles:
      - tools
    depends_on:
      - qdrant
    volumes:
      - "${RAG_CONFIG_PATH:-./config.docker.json}:/app/config.json:ro"
      - app_state:/data/state
      - app_logs:/data/logs
      - model_cache:/data/cache
      - "${RAG_CATALOG_PATH:-O:/Обмен}:/data/catalog:ro"
    command: ["rag-index", "--url", "http://qdrant:6333"]

volumes:
  qdrant_data:
  app_state:
  app_logs:
  model_cache:
  minio_data:
