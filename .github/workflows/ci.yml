name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python tests
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install -r requirements-ci.lock

      - name: Compile package
        shell: pwsh
        run: |
          $files = Get-ChildItem src -Recurse -Filter *.py | ForEach-Object { $_.FullName }
          python -m py_compile $files

      - name: Lint package
        shell: pwsh
        run: python -m ruff check src tests

      - name: Launcher smoke
        shell: pwsh
        run: python -m rag_catalog.cli.launcher --help

      - name: Run tests
        shell: pwsh
        run: python -m pytest -q

  docker-smoke:
    name: Docker build smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --pull -t rag-catalog-smoke .
