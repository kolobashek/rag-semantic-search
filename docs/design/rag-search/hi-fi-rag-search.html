// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  font-family: var(--font-text); background: var(--bg); color: var(--ink);

  font-feature-settings: 'cv02','cv03','cv04','cv11','ss01';
}
#root, .hifi-app { height: 100vh; width: 100vw; overflow: hidden; }

/* === SCROLLBARS === */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 5px; border: 2px solid var(--bg); }
*::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }

/* === MONO LABEL === */
.mono-label {
  font-family: var(--font-mono); font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-3);
}
.mono-num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

/* === DISPLAY TEXT === */
.hd {
  font-family: var(--font-display); font-weight: 800;
  letter-spacing: -0.04em; line-height: 0.92;
}

/* === HEADER === */
.app-header {
  height: 56px; flex-shrink: 0;
  display: grid; grid-template-columns: 220px 1fr 320px;
  align-items: center; padding: 0 16px;
  background: color-mix(in oklch, var(--bg) 86%, transparent);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  position: relative; z-index: 10;
}
.app-header-brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
.app-header-brand-name { font-family: var(--font-display); font-weight: 700; font-size: 14px; letter-spacing: -0.02em; }
.app-header-nav { display: flex; gap: 4px; align-items: center; justify-content: center; }
.app-header-actions { display: flex; gap: 8px; align-items: center; justify-content: flex-end; }

.nav-tab {
  position: relative;
  padding: 8px 14px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; color: var(--ink-3);
  cursor: pointer; user-select: none;
  display: inline-flex; align-items: center; gap: 8px;
  transition: color 160ms ease, background 160ms ease;
}
.nav-tab:hover { color: var(--ink); background: var(--bg-sunken); }
.nav-tab.active { color: var(--ink); }
.nav-tab.active::after {
  content: ''; position: absolute; left: 14px; right: 14px; bottom: -8px;
  height: 2px; background: var(--brand-500);
  box-shadow: 0 0 12px color-mix(in oklch, var(--brand-500) 60%, transparent);
}
.nav-tab .nav-tab-kbd {
  font-family: var(--font-mono); font-size: 10px; color: var(--ink-4);
  padding: 1px 5px; border: 1px solid var(--line); border-radius: 4px;
}

/* === LOGO MARK === */
.mark {
  border-radius: 8px; background: var(--brand-500);
  display: grid; place-items: center;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.mark::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,.22));
}
.mark::after {
  content: ''; position: absolute; inset: -1px;
  border-radius: inherit; padding: 1px;
  background: linear-gradient(180deg, rgba(255,255,255,.4), transparent 60%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}
.mark > svg { position: relative; z-index: 1; }

/* === LIQUID BACKGROUND (Brand panel) === */
.liquid-bg {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden;
}
.liquid-bg::before {
  content:''; position:absolute; inset:-20%;
  background:
    radial-gradient(600px 400px at 15% 20%, color-mix(in oklch, var(--brand-500) 45%, transparent), transparent 65%),
    radial-gradient(700px 500px at 85% 80%, color-mix(in oklch, var(--accent-cyan) 25%, transparent), transparent 60%),
    radial-gradient(400px 300px at 60% 45%, color-mix(in oklch, var(--accent-amber) 10%, transparent), transparent 60%);
  filter: blur(40px); animation: liquid 22s ease-in-out infinite alternate;
}
@keyframes liquid {
  0%, 100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(2%, -2%) scale(1.05); }
  66%      { transform: translate(-2%, 2%) scale(.97); }
}

.grid-overlay {
  position: absolute; inset: 0; pointer-events: none; opacity: .35;
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 56px 56px;
  mask: radial-gradient(circle at 30% 30%, black, transparent 70%);
  -webkit-mask: radial-gradient(circle at 30% 30%, black, transparent 70%);
}

/* === GLASS PANEL === */
.glass {
  background: color-mix(in oklch, var(--bg-elev) 78%, transparent);
  border: 1px solid var(--line);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
}

/* === GLOWING BORDER === */
.glow-border {
  position: relative;
}
.glow-border::before {
  content: ''; position: absolute; inset: -1px;
  border-radius: inherit; padding: 1px;
  background: linear-gradient(135deg,
    color-mix(in oklch, var(--brand-500) 40%, transparent),
    transparent 30%,
    color-mix(in oklch, var(--accent-cyan) 30%, transparent) 80%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  pointer-events: none;
}

/* === BUTTON === */
.btn {
  position: relative; overflow: hidden; isolation: isolate;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border-radius: var(--radius-sm);
  font-family: var(--font-text); font-size: 13px; font-weight: 500;
  border: 1px solid transparent; cursor: pointer;
  transition: color 160ms ease, border-color 160ms ease, transform 120ms ease, box-shadow 160ms ease;
  user-select: none; line-height: 1;
}
.btn svg { width: 14px; height: 14px; }
.btn::before {
  content: ''; position: absolute; inset: 0; z-index: -1;
  transform-origin: left center; transform: scaleX(0);
  transition: transform 320ms cubic-bezier(.65,0,.35,1);
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); transition-duration: 80ms; }

.btn-primary { background: var(--brand-500); color: white; }
.btn-primary::before { background: var(--brand-700); }
.btn-primary:hover { box-shadow: 0 8px 20px -6px color-mix(in oklch, var(--brand-500) 70%, transparent); }
.btn-primary:hover::before { transform: scaleX(1); }

.btn-secondary { background: var(--bg-elev); border-color: var(--line-strong); color: var(--ink); }
.btn-secondary::before { background: var(--ink); }
.btn-secondary:hover { color: var(--bg-elev); border-color: var(--ink); }
.btn-secondary:hover::before { transform: scaleX(1); }

.btn-ghost { background: transparent; color: var(--ink-2); }
.btn-ghost::before { background: var(--bg-sunken); }
.btn-ghost:hover { color: var(--ink); }
.btn-ghost:hover::before { transform: scaleX(1); }

.btn-danger { background: var(--err); color: white; }
.btn-danger::before { background: #991b1b; }
.btn-danger:hover { box-shadow: 0 8px 20px -6px color-mix(in oklch, var(--err) 70%, transparent); }
.btn-danger:hover::before { transform: scaleX(1); }

.btn-lg { padding: 13px 20px; font-size: 15px; border-radius: var(--radius-md); }
.btn-sm { padding: 6px 10px; font-size: 12px; }
.btn-icon { padding: 8px; }
.btn-icon svg { width: 16px; height: 16px; }

/* === INPUT === */
.input {
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; height: 38px;
  background: var(--bg-elev); border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  transition: border-color 160ms, box-shadow 160ms, background 160ms;
  position: relative;
}
.input input {
  flex: 1; border: none; outline: none; background: transparent;
  font: 500 14px/1.5 var(--font-text); color: var(--ink);
}
.input input::placeholder { color: var(--ink-4); }
.input:focus-within {
  border-color: var(--brand-500);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--brand-500) 15%, transparent);
}
.input-lg { height: 52px; padding: 0 18px; border-radius: var(--radius-md); }
.input-lg input { font-size: 16px; }

/* === KBD === */
.kbd {
  font-family: var(--font-mono); font-size: 11px; color: var(--ink-3);
  padding: 3px 6px; border: 1px solid var(--line); border-radius: 4px;
  background: var(--bg-sunken);
  line-height: 1;
}

/* === CHIP === */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 500; line-height: 1.4;
  background: var(--bg-elev); border: 1px solid var(--line);
  color: var(--ink-2);
}
.chip svg { width: 12px; height: 12px; }
.chip-primary { background: color-mix(in oklch, var(--brand-500) 12%, var(--bg-elev)); border-color: color-mix(in oklch, var(--brand-500) 30%, var(--line)); color: var(--brand-500); }
.chip-success { background: color-mix(in oklch, var(--ok) 10%, var(--bg-elev)); border-color: color-mix(in oklch, var(--ok) 30%, var(--line)); color: var(--ok); }
.chip-warn { background: color-mix(in oklch, var(--warn) 12%, var(--bg-elev)); border-color: color-mix(in oklch, var(--warn) 30%, var(--line)); color: #b6730a; }
.chip-danger { background: color-mix(in oklch, var(--err) 10%, var(--bg-elev)); border-color: color-mix(in oklch, var(--err) 30%, var(--line)); color: var(--err); }
.chip-bare { background: transparent; border: none; padding: 4px 0; }
[data-theme=dark] .chip-warn { color: #fbbf24; }

/* === STATUS DOT === */
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.dot-ok { background: var(--ok); box-shadow: 0 0 0 3px color-mix(in oklch, var(--ok) 22%, transparent), 0 0 8px color-mix(in oklch, var(--ok) 50%, transparent); }
.dot-info { background: var(--brand-500); box-shadow: 0 0 0 3px color-mix(in oklch, var(--brand-500) 22%, transparent), 0 0 8px color-mix(in oklch, var(--brand-500) 50%, transparent); animation: pulse 2s infinite; }
.dot-warn { background: var(--warn); box-shadow: 0 0 0 3px color-mix(in oklch, var(--warn) 22%, transparent); }
.dot-err { background: var(--err); box-shadow: 0 0 0 3px color-mix(in oklch, var(--err) 22%, transparent); }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--brand-500) 60%, transparent), 0 0 8px color-mix(in oklch, var(--brand-500) 50%, transparent); }
  50%      { box-shadow: 0 0 0 6px color-mix(in oklch, var(--brand-500) 0%, transparent), 0 0 12px color-mix(in oklch, var(--brand-500) 30%, transparent); }
}

/* === CARD === */
.card {
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius-md); padding: 18px;
  box-shadow: var(--shadow-1);
  position: relative;
}

/* === FILE ICON === */
.file-icon {
  border-radius: 6px; display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 9px; font-weight: 700; color: white;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.file-icon.lg { width: 40px; height: 40px; font-size: 10px; border-radius: 8px; }
.file-icon.md { width: 32px; height: 32px; font-size: 9px; }
.file-icon.sm { width: 24px; height: 24px; font-size: 8px; border-radius: 4px; }
.file-icon.pdf { background: linear-gradient(135deg, #dc2626, #991b1b); }
.file-icon.doc { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
.file-icon.xls { background: linear-gradient(135deg, #16a34a, #15803d); }
.file-icon.folder { background: linear-gradient(135deg, #f59e0b, #d97706); }
.file-icon.img { background: linear-gradient(135deg, #a855f7, #7c3aed); }
.file-icon.txt { background: linear-gradient(135deg, #64748b, #475569); }

/* === PROGRESS BAR === */
.progress {
  height: 6px; background: var(--line); border-radius: 3px; overflow: hidden;
  position: relative;
}
.progress > div {
  height: 100%; background: var(--brand-500); border-radius: 3px;
  position: relative; overflow: hidden;
  transition: width 600ms cubic-bezier(.65,0,.35,1);
}
.progress > div::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
  animation: shimmer 1.6s infinite;
}
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

.freshness { height: 4px; border-radius: 2px; }
.freshness.green { background: var(--ok); }
.freshness.blue { background: var(--brand-500); }
.freshness.red { background: var(--err); }
.freshness.empty { background: var(--line); }

/* === SHIMMER LOADER === */
.shimmer {
  background: linear-gradient(90deg, var(--bg-sunken) 0%, color-mix(in oklch, var(--ink) 6%, var(--bg-sunken)) 50%, var(--bg-sunken) 100%);
  background-size: 200% 100%;
  animation: shimmer-bg 1.4s linear infinite;
  border-radius: 4px;
}
@keyframes shimmer-bg { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* === DRAWER === */
.drawer {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: 480px; max-width: 90vw;
  background: var(--bg-elev); border-left: 1px solid var(--line);
  box-shadow: var(--shadow-3);
  transform: translateX(0); transition: transform 320ms cubic-bezier(.65,0,.35,1);
  z-index: 50;
  display: flex; flex-direction: column;
}
.drawer.closed { transform: translateX(110%); }
.drawer-scrim {
  position: fixed; inset: 0; background: var(--bg-overlay);
  opacity: 1; transition: opacity 240ms; z-index: 49;
}
.drawer-scrim.closed { opacity: 0; pointer-events: none; }

/* === DIVIDER === */
.divider-mono {
  display: flex; align-items: center; gap: 12px;
  color: var(--ink-4); font-family: var(--font-mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.12em;
}
.divider-mono::before, .divider-mono::after {
  content: ''; flex: 1; height: 1px; background: var(--line);
}

/* === UTILITIES === */
.stack > * + * { margin-top: var(--stack-gap, 12px); }
.row { display: flex; align-items: center; gap: var(--row-gap, 10px); }
.row-between { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.col { display: flex; flex-direction: column; gap: var(--col-gap, 10px); }
.muted { color: var(--ink-3); }
.muted-2 { color: var(--ink-4); }

/* === SCAN LINE EFFECT (subtle) === */
.scan-lines {
  position: relative;
}
.scan-lines::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background-image: repeating-linear-gradient(180deg, transparent 0 2px, rgba(255,255,255,.02) 2px 3px);
  border-radius: inherit;
  mix-blend-mode: overlay;
}

/* === PILL TAB GROUP === */
.tab-group {
  display: inline-flex; padding: 3px;
  background: var(--bg-sunken); border-radius: var(--radius-sm);
  border: 1px solid var(--line);
}
.tab-group > button {
  padding: 6px 12px; border-radius: 4px;
  font-size: 12px; font-weight: 500; color: var(--ink-3);
  border: none; background: transparent; cursor: pointer;
  transition: all 160ms ease;
}
.tab-group > button.active {
  background: var(--bg-elev); color: var(--ink); box-shadow: var(--shadow-1);
}

/* === RESULT ROW === */
.result-row {
  display: grid; grid-template-columns: 18px 40px 1fr auto auto auto;
  gap: 14px; align-items: center;
  padding: 12px 16px;
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 160ms ease;
  position: relative;
}
.result-row:hover {
  border-color: color-mix(in oklch, var(--brand-500) 30%, var(--line));
  box-shadow: var(--shadow-1);
}
.result-row.selected {
  background: color-mix(in oklch, var(--brand-500) 6%, var(--bg-elev));
  border-color: color-mix(in oklch, var(--brand-500) 40%, var(--line));
  box-shadow: 0 0 0 1px color-mix(in oklch, var(--brand-500) 35%, transparent);
}
.result-row .result-name {
  font-family: var(--font-display); font-weight: 600;
  font-size: 14px; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.result-row .result-path {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--ink-3); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.result-row .result-meta {
  font-family: var(--font-mono); font-size: 11px; color: var(--ink-3);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.result-row .result-score { color: var(--ink-4); opacity: 0.5; }
.result-row .result-actions {
  color: var(--ink-3); font-size: 20px;
  padding: 6px 8px; border-radius: 4px;
  cursor: pointer; line-height: 1;
}
.result-row .result-actions:hover { background: var(--bg-sunken); color: var(--ink); }
.result-row .check-box {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1px solid var(--line-strong); background: var(--bg-elev);
  display: grid; place-items: center;
}
.result-row.selected .check-box {
  background: var(--brand-500); border-color: var(--brand-500); color: white;
}

/* === ANIMATED COUNTER === */
@keyframes flip-up {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100%); opacity: 0; }
}

/* === TICKER === */
.ticker-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent-cyan);
  box-shadow: 0 0 8px var(--accent-cyan);
  animation: ticker 1.2s infinite alternate;
}
@keyframes ticker {
  from { opacity: 0.3; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1.2); }
}

// hifi-components.jsx — reusable building blocks for hi-fi prototype

/* ── Logo mark ───────────────────────────────────────── */
function LogoMark({ size = 28 }) {
  return (
    <div className="mark" style={{ width: size, height: size, borderRadius: size * 0.28 }}>
      <svg width={size * 0.54} height={size * 0.54} viewBox="0 0 32 32" fill="none">
        <path d="M9 8 L9 24 M9 8 L17 8 Q22 8 22 13 Q22 18 17 18 L9 18" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx="22" cy="22" r="4.5" stroke="white" strokeWidth="3" fill="none"/>
      </svg>
    </div>
  );
}

function Logo({ size = 28, withName = true }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: size * 0.4 }}>
      <LogoMark size={size} />
      {withName && (
        <span style={{
          fontFamily: 'var(--font-display)', fontWeight: 700,
          fontSize: size * 0.5, letterSpacing: '-0.02em',
        }}>Rag-search</span>
      )}
    </div>
  );
}

/* ── File icon by extension ──────────────────────────── */
function FileIconBox({ ext = 'doc', size = 'md' }) {
  const map = { pdf: 'PDF', doc: 'DOC', docx: 'DOC', xls: 'XLS', xlsx: 'XLS', img: 'IMG', jpg: 'IMG', png: 'IMG', txt: 'TXT', folder: '', md: 'TXT' };
  const cls = ['pdf','doc','docx'].includes(ext) ? (ext === 'pdf' ? 'pdf' : 'doc')
              : ['xls','xlsx'].includes(ext) ? 'xls'
              : ['img','jpg','png','jpeg'].includes(ext) ? 'img'
              : ext === 'folder' ? 'folder' : 'txt';
  return (
    <div className={`file-icon ${size} ${cls}`}>
      {cls === 'folder' ? Icon.folder({ width: size === 'lg' ? 22 : size === 'sm' ? 14 : 18, height: size === 'lg' ? 22 : size === 'sm' ? 14 : 18, stroke: 'white', strokeWidth: 1.6 }) : map[ext]}
    </div>
  );
}

/* ── Live counter (smoothly increments) ──────────────── */
function LiveCounter({ value, format = (v) => v.toLocaleString('ru-RU').replace(/,/g, ' '), className, style, drift = false }) {
  const [v, setV] = React.useState(value);
  React.useEffect(() => {
    if (!drift) { setV(value); return; }
    const t = setInterval(() => setV(prev => prev + Math.floor(Math.random() * 2)), 3800);
    return () => clearInterval(t);
  }, [value, drift]);
  return <span className={className} style={{ fontVariantNumeric: 'tabular-nums', ...style }}>{format(v)}</span>;
}

/* ── Kbd hint ────────────────────────────────────────── */
function Kbd({ children }) {
  return <span className="kbd">{children}</span>;
}

/* ── Chip with optional icon and trailing close ──────── */
function Chip({ variant, children, icon, onClose, onClick, style = {} }) {
  const cls = variant ? `chip chip-${variant}` : 'chip';
  return (
    <span className={cls} onClick={onClick} style={{ cursor: onClick ? 'pointer' : 'default', ...style }}>
      {icon && icon}
      <span>{children}</span>
      {onClose && (
        <button onClick={(e) => { e.stopPropagation(); onClose(); }}
          style={{ marginLeft: 4, border: 'none', background: 'transparent', color: 'inherit', cursor: 'pointer', display: 'grid', placeItems: 'center', padding: 0, opacity: 0.7 }}>
          {Icon.close({ width: 11, height: 11 })}
        </button>
      )}
    </span>
  );
}

/* ── Status dot + label ──────────────────────────────── */
function StatusDot({ status = 'ok', label, sub }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
      <span className={`dot dot-${status}`} />
      {label && <span style={{ fontSize: 12 }}>{label}</span>}
      {sub && <span className="mono-label">{sub}</span>}
    </span>
  );
}

/* ── KPI Card — big display number ──────────────────── */
function KPI({ label, value, delta, deltaPositive = true, sparkline, footer }) {
  return (
    <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <div className="row-between">
        <span className="mono-label">{label}</span>
        {delta && (
          <span style={{
            fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 600,
            color: deltaPositive ? 'var(--ok)' : 'var(--err)',
            padding: '2px 6px',
            background: deltaPositive ? 'color-mix(in oklch, var(--ok) 12%, var(--bg-elev))' : 'color-mix(in oklch, var(--err) 12%, var(--bg-elev))',
            borderRadius: 4,
          }}>{deltaPositive ? '↑' : '↓'} {delta}</span>
        )}
      </div>
      <div style={{
        fontFamily: 'var(--font-display)', fontWeight: 800,
        fontSize: 36, letterSpacing: '-0.03em', lineHeight: 1,
        fontVariantNumeric: 'tabular-nums',
      }}>{value}</div>
      {sparkline && <MiniSparkline data={sparkline} />}
      {footer && <div className="mono-label" style={{ marginTop: 'auto' }}>{footer}</div>}
    </div>
  );
}

/* ── Mini sparkline (SVG) ────────────────────────────── */
function MiniSparkline({ data, height = 24, color = 'var(--brand-500)' }) {
  if (!data || !data.length) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const w = 100, h = height;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ display: 'block' }}>
      <defs>
        <linearGradient id="sparkFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polyline points={`0,${h} ${points} ${w},${h}`} fill="url(#sparkFill)" />
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

/* ── Section block ───────────────────────────────────── */
function Section({ title, eyebrow, action, children, collapsible = false, defaultOpen = true, style = {} }) {
  const [open, setOpen] = React.useState(defaultOpen);
  return (
    <section style={{ display: 'flex', flexDirection: 'column', gap: 12, ...style }}>
      {(title || eyebrow || action) && (
        <header className="row-between" style={{ alignItems: 'baseline' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            {collapsible && (
              <button onClick={() => setOpen(!open)} style={{ border: 'none', background: 'transparent', cursor: 'pointer', padding: 4, color: 'var(--ink-3)', display: 'grid', placeItems: 'center' }}>

function SearchScreen({ state = 'results' }) {
  // states: idle | loading | results | empty | error
  const [searchState, setSearchState] = React.useState(state);
  const [query, setQuery] = React.useState(state === 'idle' ? '' : 'карточка предприятия');
  const [focused, setFocused] = React.useState(state === 'idle');
  const [aiOn, setAiOn] = React.useState(true);
  const [selected, setSelected] = React.useState(null);
  const [previewOpen, setPreviewOpen] = React.useState(false);
  const [refineQuery, setRefineQuery] = React.useState('');
  const [view, setView] = React.useState('list'); // list / grid / table
  const [grouping, setGrouping] = React.useState('type'); // none / type / date

  const onSubmit = () => {
    setFocused(false);
    setSearchState('loading');
    setTimeout(() => setSearchState('results'), 1400);
  };

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Top search bar */}
      <div style={{
        flexShrink: 0, padding: '20px 32px 12px',
        position: 'relative', zIndex: 5,
      }}>
        <div style={{ maxWidth: 1320, margin: '0 auto' }}>
          <SearchInput
            value={query} onChange={setQuery} onSubmit={onSubmit}
            focused={focused} setFocused={setFocused}
            aiOn={aiOn} setAiOn={setAiOn} />
        </div>
      </div>

      {/* Body */}
      <div style={{ flex: 1, minHeight: 0, overflow: 'auto' }}>
        <div style={{ maxWidth: 1320, margin: '0 auto', padding: '8px 32px 80px' }}>
          {searchState === 'idle' && <SearchIdle />}
          {searchState === 'loading' && <SearchLoading />}
          {searchState === 'empty' && <SearchEmpty query={query} />}
          {searchState === 'results' && (
            <SearchResults
              query={query}
              refineQuery={refineQuery} setRefineQuery={setRefineQuery}
              view={view} setView={setView}
              grouping={grouping} setGrouping={setGrouping}
              selected={selected} setSelected={(p) => { setSelected(p); setPreviewOpen(!!p); }}
            />
          )}
        </div>
      </div>

      {/* State switcher (for demo) */}
      <div style={{
        position: 'fixed', top: 78, left: '50%', transform: 'translateX(-50%)',
        zIndex: 6,
        display: 'flex', gap: 4, padding: 4,
        background: 'var(--bg-elev)', border: '1px solid var(--line)',
        borderRadius: 999, boxShadow: 'var(--shadow-2)',
        opacity: 0.6,
      }}
      onMouseEnter={(e) => e.currentTarget.style.opacity = '1'}
      onMouseLeave={(e) => e.currentTarget.style.opacity = '0.6'}>
        <span className="mono-label" style={{ alignSelf: 'center', padding: '0 8px' }}>STATE:</span>
        {['idle','loading','results','empty'].map(s => (
          <button key={s} onClick={() => setSearchState(s)}
            style={{
              border: 'none', padding: '4px 10px',
              borderRadius: 999, cursor: 'pointer',
              background: searchState === s ? 'var(--ink)' : 'transparent',
              color: searchState === s ? 'var(--bg-elev)' : 'var(--ink-3)',
              fontSize: 11, fontFamily: 'var(--font-mono)',
            }}>{s}</button>
        ))}
      </div>

      {/* Preview drawer */}
      <div className={'drawer ' + (previewOpen ? '' : 'closed')}>
        {selected && <PreviewDrawer file={selected} onClose={() => { setPreviewOpen(false); setSelected(null); }} />}
      </div>
      {previewOpen && <div className="drawer-scrim" onClick={() => { setPreviewOpen(false); setSelected(null); }} />}
    </div>
  );
}

          {view === 'small' && <FilesSmall onSelect={(f) => { setSelected(f); setPreviewOpen(true); }} selected={selected} />}

          {/* status bar */}
          <div style={{
            position: 'sticky', bottom: 0,
            display: 'flex', justifyContent: 'space-between',
            padding: '10px 0 0',
            marginTop: 16, borderTop: '1px solid var(--line)',
            background: 'var(--bg)',
            fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)',
          }}>

            <span>выбрано: {selected ? '1 файл' : '—'}</span>
          </div>
        </div>
      </div>

      {/* Preview drawer (reuse from search) */}
      <div className={'drawer ' + (previewOpen ? '' : 'closed')}>
        {selected && <PreviewDrawer file={selected} onClose={() => { setPreviewOpen(false); setSelected(null); }} />}
      </div>
      {previewOpen && <div className="drawer-scrim" onClick={() => { setPreviewOpen(false); setSelected(null); }} />}
    </div>
  );
}

/* ── TreeNode ────────────────────────────────────────── */
function TreeNode({ label, depth = 0, expanded = false, active = false, ancestor = false, starred = false, children, icon }) {
  const [open, setOpen] = React.useState(expanded);
  return (
    <div>
      <div
        onClick={() => setOpen(!open)}
        style={{
          display: 'flex', alignItems: 'center', gap: 6,
          padding: `5px ${8 + depth * 14}px 5px ${8 + depth * 14}px`,
          borderRadius: 4,
          background: active ? 'color-mix(in oklch, var(--brand-500) 14%, transparent)' : 'transparent',
          color: active ? 'var(--brand-500)' : ancestor ? 'var(--ink)' : 'var(--ink-2)',
          fontWeight: active ? 700 : ancestor ? 600 : 400,
          fontSize: 12, cursor: 'pointer',
        }}
        onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = 'var(--bg-sunken)'; }}
        onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = 'transparent'; }}>
        {children && (
          <span style={{ color: 'var(--ink-3)', flexShrink: 0 }}>
            {open ? Icon.chevronDown({ width: 12, height: 12 }) : Icon.chevronRight({ width: 12, height: 12 })}
          </span>
        )}
        {!children && <span style={{ width: 12, flexShrink: 0 }} />}
        <span style={{ flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{label}</span>
        {starred && <span style={{ color: '#f6b700' }}>{Icon.starFilled({ width: 12, height: 12 })}</span>}
      </div>
      {open && children}
    </div>
  );
}

function PhaseRow({ name, status, start, dur, age, recent, files, units, progress, error, action }) {
  const statusColors = {
    ok: 'var(--ok)',
    running: 'var(--brand-500)',
    failed: 'var(--err)',
    pending: 'var(--ink-4)',
  };
  const statusIcons = {
    ok: Icon.check({ width: 16, height: 16 }),
    running: <span className="dot dot-info" />,
    failed: Icon.alert({ width: 14, height: 14 }),
    pending: <span style={{ fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 700 }}>?</span>,
  };

  return (
    <div className="card" style={{
      display: 'grid',
      gridTemplateColumns: '44px minmax(0, 1fr) 340px 140px',
      gap: 16, alignItems: 'center',
      padding: 16,
      borderColor: status === 'running' ? 'color-mix(in oklch, var(--brand-500) 30%, var(--line))' : 'var(--line)',
      boxShadow: status === 'running' ? '0 0 0 3px color-mix(in oklch, var(--brand-500) 8%, transparent)' : 'var(--shadow-1)',
      position: 'relative',
    }}>
      <div style={{
        width: 36, height: 36, borderRadius: 10,
        background: status === 'pending' ? 'var(--bg-sunken)' : statusColors[status],
        color: status === 'pending' ? 'var(--ink-3)' : 'white',
        display: 'grid', placeItems: 'center',
        boxShadow: status === 'running' ? '0 0 16px color-mix(in oklch, var(--brand-500) 60%, transparent)' : 'none',
      }}>
        {statusIcons[status]}
      </div>

      <div style={{ minWidth: 0 }}>
        <div className="row" style={{ marginBottom: 4 }}>
          <span style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 16 }}>{name}</span>
          <Chip
            variant={status === 'ok' ? 'success' : status === 'failed' ? 'danger' : status === 'running' ? 'primary' : null}
            style={{ padding: '2px 8px', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
            {status === 'ok' ? 'completed' : status === 'failed' ? 'failed' : status === 'running' ? 'running' : 'pending'}
          </Chip>
        </div>
        <div className="mono-label" style={{ color: error ? 'var(--err)' : 'var(--ink-3)' }}>
          {files} {units}
        </div>
        <div className="mono-label" style={{ marginTop: 4, fontSize: 10 }}>
          старт {start} · длительность {dur}
        </div>
      </div>

      {/* Progress + freshness wrapped together */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        <div className="progress" style={{ height: 8 }}>
          <div style={{
            width: `${progress}%`,
            background: error ? 'var(--err)' : status === 'ok' ? 'var(--ok)' : 'var(--brand-500)',
          }} />
        </div>
        <div className="row-between mono-label" style={{ fontSize: 10 }}>
          <span>
            свежесть:
            <span style={{ marginLeft: 6, color: recent === 'green' ? 'var(--ok)' : recent === 'blue' ? 'var(--brand-500)' : recent === 'red' ? 'var(--err)' : 'var(--ink-4)' }}>
              {age}
            </span>
          </span>
          <span style={{ fontWeight: 600 }}>{progress > 0 ? `${progress}%` : '—'}</span>
        </div>
        <div className={`freshness ${recent}`} />
      </div>

      <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
        <button className="btn btn-ghost btn-sm">
          {action.icon()} {action.label}
        </button>
        <button className="btn btn-ghost btn-icon">{Icon.more()}</button>
      </div>
    </div>
  );
}

window.IndexScreen = IndexScreen;


// ===== hifi-app.jsx =====
// hifi-app.jsx — main app router + theme/tweaks

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accent": "#3d63ff",
  "density": "default",
  "startScreen": "login"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState(t.startScreen);
  const [searchState, setSearchState] = React.useState('results');

  React.useEffect(() => {
    document.body.dataset.theme = t.theme;
    // Override --brand-500 if user changed it
    document.documentElement.style.setProperty('--brand-500', t.accent);
  }, [t.theme, t.accent]);

  const navigate = (s) => {
    setScreen(s);
    // When entering search, restore last state
  };

  // Login screen takes whole page
  if (screen === 'login') {
    return (
      <>
        <LoginScreen onLogin={() => setScreen('home')} theme={t.theme} />
        <Tweaks t={t} setTweak={setTweak} screen={screen} onScreen={setScreen} searchState={searchState} setSearchState={setSearchState} />
      </>
    );
  }

  return (
    <>
      <AppShell active={screen} onNav={navigate} theme={t.theme}
        onTheme={(v) => setTweak('theme', v)}
        user={{ name: 'Алексей', role: 'admin' }}>
        {screen === 'home' && <HomeScreen onNavigate={navigate} />}
        {screen === 'search' && <SearchScreen state={searchState} key={searchState} />}
        {screen === 'explorer' && <ExplorerScreen />}
        {screen === 'cloud' && <CloudDriveScreen />}
        {screen === 'index' && <IndexScreen />}
      </AppShell>
      <Tweaks t={t} setTweak={setTweak} screen={screen} onScreen={setScreen} searchState={searchState} setSearchState={setSearchState} />
    </>
  );
}

function Tweaks({ t, setTweak, screen, onScreen, searchState, setSearchState }) {
  return (
    <TweaksPanel>
      <TweakSection label="Тема" />
      <TweakRadio label="Цветовая схема" value={t.theme}
        options={[{ value: 'light', label: '☀ light' }, { value: 'dark', label: '☾ dark' }]}
        onChange={(v) => setTweak('theme', v)} />

      <TweakSection label="Акцент" />
      <TweakColor label="Brand" value={t.accent}
        options={['#3d63ff', '#6385ff', '#10b981', '#f43f5e', '#a855f7', '#22d3ee', '#f59e0b']}
        onChange={(v) => setTweak('accent', v)} />

      <TweakSection label="Экран" />
      <TweakSelect label="Открыть" value={screen}
        options={[
          { value: 'login', label: 'Вход' },
          { value: 'home', label: 'Главная' },
          { value: 'search', label: 'Поиск' },
          { value: 'explorer', label: 'Файлы (FS)' },
          { value: 'cloud', label: 'Cloud Drive' },
          { value: 'index', label: 'Индекс (admin)' },
        ]}
        onChange={onScreen} />

      {screen === 'search' && (
        <>
          <TweakSection label="Состояние поиска" />
          <TweakRadio label="State" value={searchState}
            options={[
              { value: 'idle', label: 'idle' },
              { value: 'loading', label: 'load' },
              { value: 'results', label: 'res' },
              { value: 'empty', label: 'empty' },
            ]}
            onChange={setSearchState} />
        </>
      )}
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
